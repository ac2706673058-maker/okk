plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jjj.battlecity'
    compileSdk 34

    defaultConfig {
        applicationId "com.jjj.battlecity"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            // 用 debug 签名,方便直接侧载安装
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
